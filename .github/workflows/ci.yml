name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_ci:
        description: "Run CI workflow manually"
        required: false
        default: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit_tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Force npm registry
        run: npm config set registry https://registry.npmjs.org/

      - name: Install dependencies (with retry)
        shell: bash
        run: |
          for i in 1 2 3; do
            npm ci && break
            if [ "$i" -eq 3 ]; then
              echo "npm ci failed after 3 attempts" >&2
              exit 1
            fi
            echo "npm ci failed (attempt $i), retrying in 5s..."
            sleep 5
          done

      - name: Run unit tests
        id: unit_run
        shell: bash
        run: |
          set +e
          npm test 2>&1 | tee unit-test.log
          exit_code=${PIPESTATUS[0]}
          set -e

          tests=$(sed -n 's/^# tests \([0-9][0-9]*\)$/\1/p' unit-test.log | tail -n1)
          passes=$(sed -n 's/^# pass \([0-9][0-9]*\)$/\1/p' unit-test.log | tail -n1)
          fails=$(sed -n 's/^# fail \([0-9][0-9]*\)$/\1/p' unit-test.log | tail -n1)
          if [ "$exit_code" -eq 0 ]; then
            status="passed"
          else
            status="failed"
          fi

          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "tests=${tests:-0}" >> "$GITHUB_OUTPUT"
          echo "passes=${passes:-0}" >> "$GITHUB_OUTPUT"
          echo "fails=${fails:-0}" >> "$GITHUB_OUTPUT"
          exit "$exit_code"

      - name: Run coverage check
        id: coverage_run
        shell: bash
        run: |
          set +e
          npm run test:coverage 2>&1 | tee coverage.log
          exit_code=${PIPESTATUS[0]}
          set -e

          lines=$(node -e "try{const s=require('./coverage/coverage-summary.json').total.lines.pct; console.log(s);}catch(e){console.log('unknown')}")
          if [ "$exit_code" -eq 0 ]; then
            status="passed"
          else
            status="failed"
          fi

          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "lines=$lines" >> "$GITHUB_OUTPUT"
          exit "$exit_code"

      - name: Write unit summary
        if: always()
        run: |
          {
            echo "## Unit Tests"
            echo "- Status: ${{ steps.unit_run.outputs.status }}"
            echo "- Total: ${{ steps.unit_run.outputs.tests }}"
            echo "- Passed: ${{ steps.unit_run.outputs.passes }}"
            echo "- Failed: ${{ steps.unit_run.outputs.fails }}"
            echo ""
            echo "## Coverage"
            echo "- Status: ${{ steps.coverage_run.outputs.status }}"
            echo "- Lines: ${{ steps.coverage_run.outputs.lines }}% (threshold: 70%)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload unit artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-artifacts-${{ github.run_id }}
          path: |
            unit-test.log
            coverage.log
            coverage
          if-no-files-found: ignore
          retention-days: 7

  e2e_tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Force npm registry
        run: npm config set registry https://registry.npmjs.org/

      - name: Install dependencies (with retry)
        shell: bash
        run: |
          for i in 1 2 3; do
            npm ci && break
            if [ "$i" -eq 3 ]; then
              echo "npm ci failed after 3 attempts" >&2
              exit 1
            fi
            echo "npm ci failed (attempt $i), retrying in 5s..."
            sleep 5
          done

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        id: e2e_run
        shell: bash
        run: |
          set +e
          npm run test:e2e:ci 2>&1 | tee e2e-test.log
          exit_code=${PIPESTATUS[0]}
          set -e

          tests=$(sed -n 's/^Running \([0-9][0-9]*\) tests .*/\1/p' e2e-test.log | tail -n1)
          passes=$(sed -n 's/^[[:space:]]*\([0-9][0-9]*\) passed.*/\1/p' e2e-test.log | tail -n1)
          fails=$(sed -n 's/^[[:space:]]*\([0-9][0-9]*\) failed.*/\1/p' e2e-test.log | tail -n1)
          flaky=$(sed -n 's/^[[:space:]]*\([0-9][0-9]*\) flaky.*/\1/p' e2e-test.log | tail -n1)
          if [ "$exit_code" -eq 0 ]; then
            status="passed"
          else
            status="failed"
          fi

          if [ -z "$fails" ]; then
            if [ "$exit_code" -eq 0 ]; then
              fails="0"
            else
              fails="unknown"
            fi
          fi

          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "tests=${tests:-0}" >> "$GITHUB_OUTPUT"
          echo "passes=${passes:-0}" >> "$GITHUB_OUTPUT"
          echo "fails=$fails" >> "$GITHUB_OUTPUT"
          echo "flaky=${flaky:-0}" >> "$GITHUB_OUTPUT"
          exit "$exit_code"

      - name: Write e2e summary
        if: always()
        run: |
          {
            echo "## E2E Tests"
            echo "- Status: ${{ steps.e2e_run.outputs.status }}"
            echo "- Total: ${{ steps.e2e_run.outputs.tests }}"
            echo "- Passed: ${{ steps.e2e_run.outputs.passes }}"
            echo "- Failed: ${{ steps.e2e_run.outputs.fails }}"
            echo "- Flaky(retried): ${{ steps.e2e_run.outputs.flaky }}"
            echo "- Retry policy: 1"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Playwright report and artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ github.run_id }}
          path: |
            playwright-report
            test-results
            e2e-test.log
          if-no-files-found: ignore
          retention-days: 7
